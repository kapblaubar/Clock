<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clock Display</title>
  <style>
    :root {
      color-scheme: dark;
      --clock-text: #f6f1e8;
      --clock-shadow: rgba(0, 0, 0, 0.58);
      --ring: rgba(255, 248, 237, 0.78);
      --face-shadow: rgba(0, 0, 0, 0.24);
      --accent: rgba(255, 132, 122, 0.95);
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      touch-action: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
      transform-origin: center center;
    }

    body.rotate-portrait #stage {
      width: 100vh;
      height: 100vw;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
    }

    body.rotate-portrait-flipped #stage {
      width: 100vh;
      height: 100vw;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(270deg);
    }

    body.rotate-landscape-flipped #stage {
      transform: rotate(180deg);
    }

    #photoLayer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    #clockCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #digitalClock {
      position: absolute;
      left: 50%;
      bottom: 10%;
      transform: translateX(-50%);
      color: var(--clock-text);
      font-size: clamp(2rem, 5vw, 4.4rem);
      letter-spacing: 0.18em;
      text-shadow: 0 0 20px var(--clock-shadow);
      white-space: nowrap;
    }

    #status {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.75);
      font-size: 1rem;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <main id="stage">
    <img id="photoLayer" alt="Display photo" />
    <canvas id="clockCanvas"></canvas>
    <div id="digitalClock"></div>
    <div id="status">Loading display...</div>
  </main>
  <script src="/app.js"></script>
</body>
</html>
